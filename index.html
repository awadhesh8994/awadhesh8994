<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Forge — by Awadhesh Kumar</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080810;
            --surface: #0f0f1a;
            --card: #13131f;
            --border: rgba(120, 100, 255, 0.15);
            --glow: #7c5cfc;
            --glow2: #fc5c9c;
            --glow3: #5cf0fc;
            --text: #e8e6ff;
            --muted: #7a78a8;
            --accent: #7c5cfc;
        }

        *, *::before, *::after {
            margin: 0; padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Syne', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated background mesh */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 10%, rgba(124, 92, 252, 0.12) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 80%, rgba(252, 92, 156, 0.08) 0%, transparent 55%),
                radial-gradient(ellipse 50% 70% at 60% 30%, rgba(92, 240, 252, 0.06) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* Grid lines */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(120, 100, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(120, 100, 255, 0.04) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        .page-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 520px;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeDown 0.8s ease both;
        }

        .logo-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(124, 92, 252, 0.12);
            border: 1px solid rgba(124, 92, 252, 0.3);
            padding: 6px 16px;
            border-radius: 100px;
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: var(--glow);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 18px;
        }

        .logo-badge::before {
            content: '';
            width: 6px; height: 6px;
            background: var(--glow);
            border-radius: 50%;
            animation: pulse 2s ease infinite;
        }

        h1 {
            font-size: clamp(38px, 8vw, 52px);
            font-weight: 800;
            line-height: 1;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #fff 0%, rgba(124,92,252,0.9) 50%, #fc5c9c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            margin-top: 10px;
            font-family: 'DM Mono', monospace;
            font-size: 13px;
            color: var(--muted);
            letter-spacing: 0.02em;
        }

        /* Main Card */
        .card {
            width: 100%;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 36px;
            position: relative;
            overflow: hidden;
            animation: fadeUp 0.8s ease 0.1s both;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--glow), transparent);
            opacity: 0.6;
        }

        /* Input group */
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: var(--muted);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .input-label svg {
            width: 14px; height: 14px;
            opacity: 0.7;
        }

        input[type="text"] {
            width: 100%;
            height: 56px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(120, 100, 255, 0.2);
            border-radius: 12px;
            padding: 0 18px;
            color: var(--text);
            font-family: 'DM Mono', monospace;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
            caret-color: var(--glow);
        }

        input[type="text"]::placeholder {
            color: rgba(120, 110, 168, 0.4);
        }

        input[type="text"]:focus {
            border-color: rgba(124, 92, 252, 0.6);
            background: rgba(124, 92, 252, 0.04);
            box-shadow: 0 0 0 4px rgba(124, 92, 252, 0.08), 0 0 20px rgba(124,92,252,0.1);
        }

        input[type="text"].error {
            border-color: rgba(252, 92, 92, 0.6);
            animation: shake 0.5s ease;
        }

        /* Size selector */
        .size-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .size-btn {
            flex: 1;
            height: 40px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(120, 100, 255, 0.15);
            border-radius: 10px;
            color: var(--muted);
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .size-btn:hover {
            border-color: rgba(124, 92, 252, 0.4);
            color: var(--text);
        }

        .size-btn.active {
            background: rgba(124, 92, 252, 0.15);
            border-color: rgba(124, 92, 252, 0.5);
            color: var(--glow);
        }

        /* Generate button */
        .btn-generate {
            width: 100%;
            height: 56px;
            background: linear-gradient(135deg, #7c5cfc, #9b7dff);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.04em;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .btn-generate::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #9b7dff, #fc5c9c);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .btn-generate:hover::before { opacity: 1; }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 40px rgba(124, 92, 252, 0.4);
        }

        .btn-generate:active {
            transform: translateY(0);
        }

        .btn-generate span {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* QR Result section */
        .qr-result {
            margin-top: 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .qr-result.visible {
            max-height: 500px;
            opacity: 1;
        }

        .qr-frame {
            position: relative;
            padding: 20px;
            background: #fff;
            border-radius: 18px;
            box-shadow:
                0 0 0 1px rgba(124,92,252,0.2),
                0 20px 60px rgba(0,0,0,0.5),
                0 0 80px rgba(124,92,252,0.15);
        }

        /* Corner decorations */
        .qr-frame::before,
        .qr-frame::after {
            content: '';
            position: absolute;
            width: 24px; height: 24px;
            border-color: var(--glow);
            border-style: solid;
        }

        .qr-frame::before {
            top: -2px; left: -2px;
            border-width: 3px 0 0 3px;
            border-radius: 4px 0 0 0;
        }

        .qr-frame::after {
            bottom: -2px; right: -2px;
            border-width: 0 3px 3px 0;
            border-radius: 0 0 4px 0;
        }

        #qrimg {
            display: block;
            width: 200px; height: 200px;
            border-radius: 4px;
        }

        .qr-meta {
            text-align: center;
        }

        .qr-meta .url-text {
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            color: var(--muted);
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Action buttons */
        .action-row {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        .btn-action {
            flex: 1;
            height: 44px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(120,100,255,0.2);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.25s ease;
        }

        .btn-action:hover {
            background: rgba(124,92,252,0.1);
            border-color: rgba(124,92,252,0.4);
            transform: translateY(-1px);
        }

        .btn-action.copied {
            background: rgba(92, 240, 180, 0.1);
            border-color: rgba(92, 240, 180, 0.4);
            color: #5cf0b4;
        }

        /* Divider */
        .divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border), transparent);
            margin: 8px 0;
        }

        /* Footer */
        footer {
            text-align: center;
            margin-top: 36px;
            animation: fadeUp 0.8s ease 0.3s both;
        }

        .footer-name {
            font-size: 13px;
            color: var(--muted);
            font-family: 'DM Mono', monospace;
        }

        .footer-name a {
            color: var(--glow);
            text-decoration: none;
            border-bottom: 1px solid rgba(124,92,252,0.3);
            padding-bottom: 1px;
            transition: border-color 0.2s;
        }

        .footer-name a:hover {
            border-color: var(--glow);
        }

        .footer-links {
            margin-top: 10px;
            display: flex;
            justify-content: center;
            gap: 16px;
        }

        .footer-links a {
            font-size: 12px;
            color: rgba(122, 120, 168, 0.5);
            text-decoration: none;
            font-family: 'DM Mono', monospace;
            transition: color 0.2s;
        }

        .footer-links a:hover {
            color: var(--muted);
        }

        /* Particles */
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 2px; height: 2px;
            background: var(--glow);
            border-radius: 50%;
            animation: float linear infinite;
            opacity: 0;
        }

        /* Animations */
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        @keyframes float {
            0% { opacity: 0; transform: translateY(100vh) rotate(0deg); }
            10% { opacity: 0.6; }
            90% { opacity: 0.3; }
            100% { opacity: 0; transform: translateY(-100px) rotate(360deg); }
        }

        @keyframes scanline {
            0% { top: -5%; }
            100% { top: 105%; }
        }

        /* Loader inside QR frame */
        .qr-loader {
            width: 200px; height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 12px;
        }

        .loader-ring {
            width: 48px; height: 48px;
            border: 3px solid rgba(124,92,252,0.2);
            border-top-color: var(--glow);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .loader-text {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: var(--muted);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Hidden utility */
        .hidden { display: none !important; }

        /* QR img reveal */
        #qrimg {
            animation: revealQR 0.4s ease both;
        }

        @keyframes revealQR {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <!-- Particles -->
    <div class="particles" id="particles"></div>

    <div class="page-wrapper">
        <!-- Header -->
        <header class="header">
            <div class="logo-badge">QR Forge v2.0</div>
            <h1>QR Forge</h1>
            <p class="subtitle">// generate · customize · download</p>
        </header>

        <!-- Main Card -->
        <div class="card">
            <!-- Input -->
            <div class="input-group">
                <label class="input-label" for="qrtext">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/>
                        <polyline points="13 2 13 9 20 9"/>
                    </svg>
                    Enter URL or Text
                </label>
                <input type="text" id="qrtext" placeholder="https://your-link.com or any text...">
            </div>

            <!-- Size selector -->
            <div class="input-group">
                <label class="input-label">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
                    </svg>
                    QR Size
                </label>
                <div class="size-row">
                    <button class="size-btn" data-size="150">150px</button>
                    <button class="size-btn active" data-size="200">200px</button>
                    <button class="size-btn" data-size="300">300px</button>
                    <button class="size-btn" data-size="400">400px</button>
                </div>
            </div>

            <!-- Generate -->
            <button class="btn-generate" onclick="generateQR()">
                <span>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <polyline points="16 3 21 3 21 8"/><polyline points="4 20 4 15 9 15 9 20"/>
                        <line x1="21" y1="3" x2="15" y2="9"/><line x1="4" y1="20" x2="9" y2="14"/>
                    </svg>
                    Generate QR Code
                </span>
            </button>

            <!-- QR Result -->
            <div class="qr-result" id="qrResult">
                <div class="divider"></div>
                <div class="qr-frame" id="qrFrame">
                    <div class="qr-loader hidden" id="qrLoader">
                        <div class="loader-ring"></div>
                        <span class="loader-text">Generating...</span>
                    </div>
                    <img src="" id="qrimg" alt="QR Code" class="hidden">
                </div>
                <div class="qr-meta">
                    <p class="url-text" id="urlDisplay"></p>
                </div>
                <div class="action-row">
                    <button class="btn-action" id="downloadBtn" onclick="downloadQR()">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="7 10 12 15 17 10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                        Download
                    </button>
                    <button class="btn-action" id="copyBtn" onclick="copyQR()">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                        </svg>
                        Copy URL
                    </button>
                    <button class="btn-action" onclick="resetQR()">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/>
                        </svg>
                        Reset
                    </button>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer>
            <p class="footer-name">
                Crafted with ♥ by <a href="https://awadhesh-io.onrender.com/" target="_blank">Awadhesh Kumar</a>
            </p>
            <p class="footer-name" style="margin-top:4px; font-size:11px; opacity:0.5;">
                📍 Lucknow, Uttar Pradesh
            </p>
            <div class="footer-links">
                <a href="#about">About</a>
                <a href="https://www.linkedin.com/in/awadhesh-kumar-615088265/" target="_blank">LinkedIn</a>
                <a href="mailto:awadhesh23th@gmail.com">Contact</a>
            </div>
        </footer>
    </div>

    <script>
        // --- Particles ---
        (function () {
            const container = document.getElementById('particles');
            for (let i = 0; i < 18; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.cssText = `
                    left: ${Math.random() * 100}%;
                    animation-duration: ${6 + Math.random() * 14}s;
                    animation-delay: ${Math.random() * 10}s;
                    width: ${1 + Math.random() * 2}px;
                    height: ${1 + Math.random() * 2}px;
                    background: ${['#7c5cfc','#fc5c9c','#5cf0fc'][Math.floor(Math.random()*3)]};
                `;
                container.appendChild(p);
            }
        })();

        // --- Size selection ---
        let selectedSize = 200;
        document.querySelectorAll('.size-btn').forEach(btn => {
            btn.addEventListener('click', function () {
                document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                selectedSize = parseInt(this.dataset.size);
                // Re-generate if QR already shown
                const qrimg = document.getElementById('qrimg');
                const text = document.getElementById('qrtext').value.trim();
                if (!qrimg.classList.contains('hidden') && text) {
                    generateQR();
                }
            });
        });

        // --- Generate QR ---
        function generateQR() {
            const input = document.getElementById('qrtext');
            const qrResult = document.getElementById('qrResult');
            const qrimg = document.getElementById('qrimg');
            const qrLoader = document.getElementById('qrLoader');
            const urlDisplay = document.getElementById('urlDisplay');

            const text = input.value.trim();

            if (!text) {
                input.classList.add('error');
                input.focus();
                setTimeout(() => input.classList.remove('error'), 600);
                return;
            }

            // Show result area
            qrResult.classList.add('visible');

            // Show loader
            qrLoader.classList.remove('hidden');
            qrimg.classList.add('hidden');

            const url = `https://api.qrserver.com/v1/create-qr-code/?size=${selectedSize}x${selectedSize}&data=${encodeURIComponent(text)}&margin=10`;

            // Preload
            const tempImg = new Image();
            tempImg.onload = function () {
                qrimg.src = url;
                qrLoader.classList.add('hidden');
                qrimg.classList.remove('hidden');
                urlDisplay.textContent = text.length > 50 ? text.slice(0, 47) + '...' : text;
            };
            tempImg.onerror = function () {
                qrLoader.classList.add('hidden');
                qrimg.src = '';
                urlDisplay.textContent = 'Failed to generate. Try again.';
            };
            tempImg.src = url;
        }

        // --- Download ---
        function downloadQR() {
            const qrimg = document.getElementById('qrimg');
            if (!qrimg.src || qrimg.classList.contains('hidden')) return;
            fetch(qrimg.src)
                .then(r => r.blob())
                .then(blob => {
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = 'qr-forge.png';
                    a.click();
                })
                .catch(() => {
                    // fallback
                    const a = document.createElement('a');
                    a.href = qrimg.src;
                    a.target = '_blank';
                    a.download = 'qr-code.png';
                    a.click();
                });
        }

        // --- Copy URL ---
        function copyQR() {
            const text = document.getElementById('qrtext').value.trim();
            if (!text) return;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.getElementById('copyBtn');
                btn.classList.add('copied');
                btn.innerHTML = `
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <polyline points="20 6 9 17 4 12"/>
                    </svg>
                    Copied!`;
                setTimeout(() => {
                    btn.classList.remove('copied');
                    btn.innerHTML = `
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                        </svg>
                        Copy URL`;
                }, 2000);
            });
        }

        // --- Reset ---
        function resetQR() {
            const input = document.getElementById('qrtext');
            const qrResult = document.getElementById('qrResult');
            const qrimg = document.getElementById('qrimg');
            input.value = '';
            qrResult.classList.remove('visible');
            qrimg.src = '';
            qrimg.classList.add('hidden');
            input.focus();
        }

        // --- Enter key support ---
        document.getElementById('qrtext').addEventListener('keydown', function (e) {
            if (e.key === 'Enter') generateQR();
        });
    </script>
</body>
</html>
